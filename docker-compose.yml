version: '3.8'

services:
  # =============================================
  # 1. PostgreSQL + pgvector
  # =============================================
  db:
    image: pgvector/pgvector:pg16  # Официальный образ с pgvector
    container_name: reader-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"  # Пробрасываем порт, чтобы подключаться с хоста
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Данные не теряются при перезапуске
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================
  # 2. Redis (кеш + брокер для Celery)
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: reader-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # =============================================
  # 3. FastAPI сервер
  # =============================================
  api:
    build: .
    container_name: reader-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Монтируем код, чтобы изменения подхватывались на лету
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy  # Ждем, пока БД реально готова
      redis:
        condition: service_healthy

  # =============================================
  # 4. Celery Worker
  # =============================================
  worker:
    build: .
    container_name: reader-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:  # Именованный volume для БД